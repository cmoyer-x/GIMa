# =============================================================================
# MAbsIslandScanner — Configuration file
# Edit paths to match your data locations before running
# =============================================================================

# ── Input data paths ──────────────────────────────────────────────────────────

# Directory containing genome FASTA files (one per strain, .fasta/.fa/.fna)
fasta_dir: "ATCC19977.FASTA"

# Directory containing Prokka GFF files (named {strain}_prokka.gff)
gff_dir: "all_gffs"

# PPanGGOLiN regions of genomic plasticity (abscessus subspecies)
rgp_file: "abscessus_pangenome/rgp_output/regions_of_genomic_plasticity.tsv"

# PPanGGOLiN outputs for massiliense and bolletii (optional)
rgp_file_mass:  "massiliense_pangenome/rgp_output/regions_of_genomic_plasticity.tsv"
spots_file_mass: "massiliense_pangenome/rgp_output/spots.tsv"
rgp_file_boll:  "bolletii_pangenome/rgp_output/regions_of_genomic_plasticity.tsv"
spots_file_boll: "bolletii_pangenome/rgp_output/spots.tsv"

# DefenseFinder output (all strains combined)
defense_systems: "all_genomes_defense_finder_systems.tsv"

# Defense RGP intersection (from intersect_defense_rgp.py)
defense_intersection: "defense_rgp_intersection.tsv"
intersection_mass:    "massiliense_defense_rgp_intersection.tsv"
intersection_boll:    "bolletii_defense_rgp_intersection.tsv"

# Genome statistics from PPanGGOLiN
genome_stats: "abscessus_pangenome/genomes_statistics.tsv"

# Optional — viewer inputs (set to "" to skip)
json_dir:          "genome_tracks"
padloc:            "padloc_all_systems.csv"
defense_predictor: "defense_gene_calls_tier1_2.csv"
prophage_dir:      "prophage_htmls"
trna_proximity:    "rgp_trna_proximity.tsv"
trna_proximity_mass: "rgp_trna_proximity_massiliense.tsv"
trna_proximity_boll: "rgp_trna_proximity_bolletii.tsv"

# ── Output directory ──────────────────────────────────────────────────────────
out_dir: "mabs_island_results"

# ── Scanner parameters ────────────────────────────────────────────────────────

# Extension beyond RGP boundaries in guided mode (bp)
# Smaller values keep boundaries closer to true attB sites
rgp_extend: 5000

# Minimum evidence lines to report an island (2-5)
# 2 = sensitive, 3 = recommended, 4 = stringent
min_evidence: 2

# Evidence threshold for final catalog (3 = moderate+high confidence)
catalog_min_evidence: 3

# Sliding window parameters
window_size: 8000   # window width in bp
step_size:   2000   # step between windows in bp

# Minimum confidence for fixed defense intersection
# high = only 4-5 evidence islands, moderate = 3-5 evidence islands
min_confidence: "moderate"

# ── BLAST validation parameters ───────────────────────────────────────────────
blast_confidence: "high"   # only high confidence fixed islands
blast_flank:      500      # bp to include flanking each island sequence

# ── Script paths ──────────────────────────────────────────────────────────────
# Update these if scripts are in a different location
scanner_script:   "scripts/mabs_island_scanner.py"
intersect_script: "scripts/intersect_denovo_defense.py"
catalog_script:   "scripts/build_island_catalog.py"
viewer_script:    "viewer/build_patient_viewer.py"
extract_script:   "scripts/extract_fixed_island_seqs.py"
